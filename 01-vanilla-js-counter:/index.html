<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla JS Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }

        .counter-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 280px;
        }

        .count {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 24px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="counter-box">
        <div id="count" class="count">0</div>
        <button id="addButton">+1する</button>
    </div>

    <script>
        const countElement = document.getElementById('count');
        const addButton = document.getElementById('addButton');

        let count = 0;

        addButton.addEventListener('click', function () {
            count += 1;
            countElement.textContent = count;
        });
    </script>
</body>
</html>
